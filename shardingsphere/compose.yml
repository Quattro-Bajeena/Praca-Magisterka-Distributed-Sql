services:
  postgres-5.1.2:
    image: postgres:16-alpine
    container_name: postgres-5.1.2
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      net-5.1.2:
        aliases:
          - postgres

  shardingsphere-5.1.2:
    image: apache/shardingsphere-proxy:5.1.2
    container_name: shardingsphere-proxy-5.1.2
    ports:
      - 13308:3308
    environment:
      PORT: 3308
    volumes:
      - ./conf/conf-5.1.2:/opt/shardingsphere-proxy/conf
      - ./logs/logs-5.1.2:/opt/shardingsphere-proxy/logs
      - ./ext-lib:/opt/shardingsphere-proxy/ext-lib
    depends_on:
      postgres-5.1.2:
        condition: service_healthy
    networks:
      - net-5.1.2

