services:
  crdb-26:
    container_name: crdb-26
    hostname: crdb-26
    image: cockroachdb/cockroach:latest-v26.1
    command: start-single-node --cluster-name=example-single-node-26 --insecure
    ports:
      - "26257:26257"
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "cockroach sql --insecure --host=127.0.0.1:26257 -e 'SELECT 1' > /dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    volumes:
      - crdb-data-26:/cockroach/cockroach-data
    networks:
      - crdb-net-26

  crdb-init-26:
    container_name: crdb-init-26
    hostname: crdb-init-26
    image: cockroachdb/cockroach:latest-v26.1
    entrypoint: /bin/sh
    command:
      - -ec
      - until cockroach sql --insecure --host=crdb-26:26257 -e "CREATE USER IF NOT EXISTS crdb; CREATE DATABASE IF NOT EXISTS crdb; GRANT ALL ON DATABASE crdb TO crdb;"; do sleep 1; done
    depends_on:
      crdb-26:
        condition: service_healthy
    networks:
      - crdb-net-26

